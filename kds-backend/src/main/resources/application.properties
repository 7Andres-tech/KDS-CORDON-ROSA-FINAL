spring.application.name=kds-backend

server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM}
twilio.whatsapp.to=${TWILIO_WHATSAPP_TO}

mercadopago.public.key=${MERCADOPAGO_PUBLIC_KEY}
mercadopago.access.token=${MERCADOPAGO_ACCESS_TOKEN}

app.public-url=${APP_PUBLIC_URL}
app.frontend-url=${APP_FRONTEND_URL}

pagos.service.url=${PAGOS_SERVICE_URL}